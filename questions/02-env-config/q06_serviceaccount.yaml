id: "02-06"
domain: Application Environment, Configuration and Security
weight: 10
difficulty: medium
title: "建立 ServiceAccount 並綁定 Pod"
prompt: |
  1. 建立 namespace: serviceaccount-namespace
  2. 建立 ServiceAccount，名稱 my-serviceaccount
  3. 建立 Pod，名稱 serviceaccount-pod，image: nginx
     - 使用 my-serviceaccount 作為 serviceAccountName
  4. 驗證：kubectl get pod serviceaccount-pod -o jsonpath={.spec.serviceAccountName}

tips: |
  kubectl create namespace serviceaccount-namespace
  kubectl create sa my-serviceaccount -n serviceaccount-namespace
  # Pod spec 加入 serviceAccountName: my-serviceaccount

setup:
  - "kubectl create namespace serviceaccount-namespace --dry-run=client -o yaml | kubectl apply -f -"

verify:
  - type: namespace_exists
    name: serviceaccount-namespace
  - type: pod_exists
    name: serviceaccount-pod
    namespace: serviceaccount-namespace
  - type: pod_running
    name: serviceaccount-pod
    namespace: serviceaccount-namespace
  - type: kubectl_output
    command: ["kubectl", "get", "pod", "serviceaccount-pod", "-n", "serviceaccount-namespace", "-o", "jsonpath={.spec.serviceAccountName}"]
    expected_output: "my-serviceaccount"

cleanup:
  - "kubectl delete namespace serviceaccount-namespace --force --grace-period=0"

sources:
  - repo: jamesbuckett/ckad-questions
    file: 02-ckad-env-configuration-security.md
    section: "02-04"

tags:
  - serviceaccount
  - rbac
  - pod
