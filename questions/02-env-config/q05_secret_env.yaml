id: "02-05"
domain: Application Environment, Configuration and Security
weight: 12
difficulty: medium
title: "建立 Immutable Secret 並注入 Pod 環境變數"
prompt: |
  1. 建立 namespace: secret-namespace
  2. 建立 Secret，名稱 my-secret，設定 immutable: true，包含：
     - user=bob
     - password=123456
  3. 建立 Pod，名稱 secret-pod，image: nginx
     - 將 secret 注入環境變數 SECRET-ENV-USER 與 SECRET-ENV-PASSWORD

tips: |
  kubectl create secret generic my-secret --from-literal=user=bob --from-literal=password=123456 --dry-run=client -o yaml > secret.yaml
  # 加入 immutable: true 後 apply
  # Pod env 使用 secretKeyRef

setup:
  - "kubectl create namespace secret-namespace --dry-run=client -o yaml | kubectl apply -f -"

verify:
  - type: namespace_exists
    name: secret-namespace
  - type: secret_exists
    name: my-secret
    namespace: secret-namespace
  - type: pod_exists
    name: secret-pod
    namespace: secret-namespace
  - type: pod_running
    name: secret-pod
    namespace: secret-namespace

cleanup:
  - "kubectl delete namespace secret-namespace --force --grace-period=0"

sources:
  - repo: jamesbuckett/ckad-questions
    file: 02-ckad-env-configuration-security.md
    section: "02-03"

tags:
  - secret
  - immutable
  - environment-variables
