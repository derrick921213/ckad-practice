id: "02-02"
domain: Application Environment, Configuration and Security
weight: 10
difficulty: easy
title: "建立 Secret 並掛載到 Pod"
prompt: |
  1. 建立 namespace: secret-namespace
  2. 建立 Secret（Opaque），名稱 my-secret：
     - key: username，value: admin
     - key: password，value: supersecret
  3. 建立 Pod，名稱 secret-pod，image: nginx
     - 透過 volume 將 Secret 掛載到 /etc/secrets 路徑

tips: |
  kubectl create secret generic my-secret \
    --from-literal=username=admin \
    --from-literal=password=supersecret \
    -n secret-namespace

setup:
  - "kubectl create namespace secret-namespace --dry-run=client -o yaml | kubectl apply -f -"

verify:
  - type: namespace_exists
    name: secret-namespace
  - type: secret_exists
    name: my-secret
    namespace: secret-namespace
  - type: pod_exists
    name: secret-pod
    namespace: secret-namespace
  - type: pod_running
    name: secret-pod
    namespace: secret-namespace

cleanup:
  - "kubectl delete namespace secret-namespace --force --grace-period=0"

tags:
  - secret
  - volume
  - security
