id: "02-15"
domain: Application Environment, Configuration and Security
weight: 10
difficulty: easy
title: "[bmuschko] 建立 Secret 並注入 Pod 環境變數 DB_PASSWORD"
prompt: |
  1. 建立 Secret db-credentials：key db-password=passwd
  2. 建立 Pod backend，image: nginx:1.23.4-alpine
     - 從 secret 注入環境變數 DB_PASSWORD
  3. exec 進入 Pod，執行 env，確認 DB_PASSWORD 存在

tips: |
  kubectl create secret generic db-credentials --from-literal=db-password=passwd
  # Pod env 使用 secretKeyRef
  kubectl exec -it backend -- env | grep DB_PASSWORD

setup: []

verify:
  - type: secret_exists
    name: db-credentials
  - type: pod_running
    name: backend

cleanup:
  - "kubectl delete pod backend --ignore-not-found --force --grace-period=0"
  - "kubectl delete secret db-credentials --ignore-not-found"

sources:
  - repo: bmuschko/ckad-crash-course
    file: exercises/27-secret/instructions.md
    section: "Exercise 27"

tags:
  - secret
  - environment-variables
  - pod
