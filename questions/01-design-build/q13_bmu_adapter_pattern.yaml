id: "01-13"
domain: Application Design and Build
weight: 12
difficulty: medium
title: "[bmuschko] Adapter Pattern：sidecar 轉換 log 格式"
prompt: |
  1. 建立 Pod adapter.yaml，定義兩個 containers：
     - app：image busybox:1.36.1
       指令：while true; do echo "$(date) | $(du -sh ~)" >> /var/logs/diskspace.txt; sleep 5; done;
     - transformer：image busybox:1.36.1
       指令：sleep 20; while true; do while read LINE; do echo "$LINE" | cut -f2 -d"|" >> $(date +%Y-%m-%d-%H-%M-%S)-transformed.txt; done < /var/logs/diskspace.txt; sleep 20; done;
  2. 定義 emptyDir volume，掛載到兩個 container 的 /var/logs
  3. 建立 Pod，進入 transformer container
  4. 確認目錄每 20 秒產生新的 transformed 檔案

tips: |
  kubectl apply -f adapter.yaml
  kubectl exec -it adapter -c transformer -- sh
  ls -la  # 確認 transformed 檔案

setup: []

verify:
  - type: pod_exists
    name: adapter
  - type: pod_running
    name: adapter

cleanup:
  - "kubectl delete pod adapter --ignore-not-found --force --grace-period=0"

sources:
  - repo: bmuschko/ckad-crash-course
    file: exercises/08-adapter-pattern/instructions.md
    section: "Exercise 8"

tags:
  - adapter-pattern
  - sidecar
  - multi-container
  - logs
