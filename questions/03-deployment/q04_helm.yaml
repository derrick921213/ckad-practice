id: "03-04"
domain: Application Deployment
weight: 12
difficulty: medium
title: "使用 Helm 安裝 WordPress"
prompt: |
  1. 建立 namespace: wordpress-namespace
  2. 新增 Bitnami Helm repo
  3. 搜尋 bitnami/wordpress chart
  4. 安裝 WordPress，設定：
     - wordpressUsername=admin
     - wordpressPassword=password
     - mariadb.auth.rootPassword=secretpassword
     - service.type=ClusterIP
  5. 列出 Helm releases
  6. 卸載 WordPress

tips: |
  kubectl create namespace wordpress-namespace
  helm repo add bitnami https://charts.bitnami.com/bitnami
  helm search repo bitnami | grep wordpress
  helm install my-wp-release --set wordpressUsername=admin,wordpressPassword=password,mariadb.auth.rootPassword=secretpassword,service.type=ClusterIP bitnami/wordpress -n wordpress-namespace
  helm ls -n wordpress-namespace
  helm uninstall my-wp-release -n wordpress-namespace

setup:
  - "kubectl create namespace wordpress-namespace --dry-run=client -o yaml | kubectl apply -f -"

verify:
  - type: kubectl_output
    command: ["helm", "ls", "-n", "wordpress-namespace", "-q"]
    expected_output: "my-wp-release"

cleanup:
  - "helm uninstall my-wp-release -n wordpress-namespace"
  - "kubectl delete namespace wordpress-namespace --force --grace-period=0"

sources:
  - repo: jamesbuckett/ckad-questions
    file: 03-ckad-deployment.md
    section: "03-04"

tags:
  - helm
  - wordpress
  - deployment
