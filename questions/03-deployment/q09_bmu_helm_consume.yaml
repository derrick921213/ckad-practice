id: "03-09"
domain: Application Deployment
weight: 10
difficulty: medium
title: "[bmuschko] 使用 Helm 安裝 Prometheus"
prompt: |
  1. 新增 prometheus-community Helm repo
  2. 更新 chart 資訊
  3. 列出可用 charts 並確認 kube-prometheus-stack 最新版本
  4. 安裝 kube-prometheus-stack chart
  5. 列出已安裝的 Helm chart
  6. 查找 Service: prometheus-operated（default namespace）
  7. port-forward 本地 8080 → Service 9090
  8. 開啟瀏覽器查看 Prometheus dashboard
  9. 停止 port-forward，卸載 chart

tips: |
  helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  helm repo update
  helm search repo prometheus-community/kube-prometheus-stack
  helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack
  helm ls
  kubectl get service prometheus-operated
  kubectl port-forward svc/prometheus-operated 8080:9090
  helm uninstall kube-prometheus-stack

setup: []

verify:
  - type: kubectl_output
    command: ["helm", "ls", "-q"]
    expected_output: "kube-prometheus-stack"

cleanup:
  - "helm uninstall kube-prometheus-stack --ignore-not-found"

sources:
  - repo: bmuschko/ckad-crash-course
    file: exercises/14-helm-consume-chart/instructions.md
    section: "Exercise 14"

tags:
  - helm
  - prometheus
  - monitoring
