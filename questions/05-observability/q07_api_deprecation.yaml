id: "05-07"
domain: Observability and Maintenance
weight: 8
difficulty: medium
title: "使用 kubectl convert 升級 deprecated API 版本"
prompt: |
  1. 建立一個 Ingress YAML，使用舊版 networking.k8s.io/v1beta1
  2. 使用 kubectl-convert 工具將其轉換為 networking.k8s.io/v1
  
  kubectl-convert 安裝：
    curl -LO https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl-convert
    sudo install -o root -g root -m 0755 kubectl-convert /usr/local/bin/kubectl-convert

tips: |
  kubectl-convert -f ingress.yaml --output-version networking.k8s.io/v1

setup: []

verify:
  - type: kubectl_output
    command: ["kubectl-convert", "--help"]
    expected_output: "convert"

cleanup: []

sources:
  - repo: jamesbuckett/ckad-questions
    file: 05-ckad-observability-maintenance.md
    section: "05-06"

tags:
  - api-deprecation
  - kubectl-convert
  - ingress
